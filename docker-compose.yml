services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user ${SURREAL_USER:-root} --pass ${SURREAL_PASSWORD:-root} rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "${SURREAL_PORT:-8000}:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always
    deploy:
      resources:
        limits:
          cpus: '${SURREAL_CPU_LIMIT:-1.0}'
          memory: ${SURREAL_MEM_LIMIT:-1G}

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "${WEB_UI_PORT:-8502}:8502"  # Web UI
      - "${API_PORT:-5055}:5055"  # REST API
    environment:
      # REQUIRED: Change this to your own secret string
      # This encrypts your API keys in the database
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}

      # Database connection (default values - no need to change)
      - SURREAL_URL=${SURREAL_URL:-ws://surrealdb:8000/rpc}
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASSWORD=${SURREAL_PASSWORD:-root}
      - SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-open_notebook}
      - SURREAL_DATABASE=${SURREAL_DATABASE:-open_notebook}
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always
    deploy:
      resources:
        limits:
          cpus: '${OPEN_NOTEBOOK_CPU_LIMIT:-1.5}'
          memory: ${OPEN_NOTEBOOK_MEM_LIMIT:-2G}
